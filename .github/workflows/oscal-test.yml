name: OSCAL Testing

permissions: {}

on:
  pull_request:
    branches:
      - main
    paths:
      - "gemaraconv/**"
      - "cmd/oscalexport/**"

jobs:
  OSCAL-Test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Generate OSCAL artifacts
        run: make oscal-export
      - name: Setup Java # this is here because oscal-cli-action below needs a java runtime
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        id: setup-java
        with:
          distribution: temurin
          java-version: 17
      - name: Validate OSCAL catalog
        uses: oscal-club/oscal-cli-action@6a8b6368885714e46fa1d4a65a6ce665902e08b7 # v2.1.0
        with:
          args: validate ./artifacts/catalog.json
      - name: Validate OSCAL profile
        uses: oscal-club/oscal-cli-action@6a8b6368885714e46fa1d4a65a6ce665902e08b7 # v2.1.0
        with:
          args: validate ./artifacts/profile.json
      - name: Validate OSCAL guidance catalog
        uses: oscal-club/oscal-cli-action@6a8b6368885714e46fa1d4a65a6ce665902e08b7 # v2.1.0
        with:
          args: validate ./artifacts/guidance.json
      - name: Validate OSCAL assessment results
        # TODO(oscal-ar): Enable full constraint validation once upstream
        # oscal-cli constraints for assessment-results are verified against
        # Gemara-generated documents. Structural validation still runs.
        uses: oscal-club/oscal-cli-action@6a8b6368885714e46fa1d4a65a6ce665902e08b7 # v2.1.0
        with:
          args: validate --disable-constraint-validation ./artifacts/assessment-results.json
